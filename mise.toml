[tools]
go = "latest"

[tasks.rss]
description = "Generate RSS feeds"
run         = "go run cmd/rss-builder/main.go"

[tasks.clean]
run = ["go clean", "rm -- output/*.xml"]

[tasks.fmt]
run = "go fmt ./..."

[tasks.vet]
hide    = true  # use check
depends = ["fmt"]
run     = "go vet ./..."

[tasks.fix]
hide    = true  # use check
depends = ["fmt"]
run     = "go fix ./..."

[tasks.golangci-lint]
hide    = true  # use check
depends = ["fmt"]
run     = "golangci-lint run ./..."

[tasks.govulncheck]
hide    = true  # use check
depends = ["fmt"]
run     = "govulncheck ./..."

[tasks.check]
depends = ["vet", "fix", "golangci-lint", "govulncheck"]

[tasks.build]
depends = ["fmt"]
run     = "go build -o bin/rss-builder ./cmd/rss-builder"

[env]
_.path = ["bin/"]
